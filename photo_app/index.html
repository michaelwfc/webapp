<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC
  "-//W3C//DTD XHTML 1.0 Strict//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">


    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>Six Boxes</title>
        <link rel="stylesheet" type="text/css" href="styleA.css" />
    </head>

    <body>

        <div class="stack">
            <!-- Boxes A–E: top-left row, horizontal, no-wrap -->
            <div class="box-row">   
                <div class="box box-1">
                <span class="box-label">A</span>
                <div class="dot"></div>
                </div>
                <div class="box box-2">
                <span class="box-label">B</span>
                <div class="dot"></div>
                </div>
                <div class="box box-3">
                <span class="box-label">C</span>
                <div class="dot"></div>
                </div>
                <div class="box box-4">
                <span class="box-label">D</span>
                <div class="dot"></div>
                </div>
                <div class="box box-5">
                <span class="box-label">E</span>
                <div class="dot"></div>
                </div>
            </div>

            <!-- Box E: fixed to bottom-right corner -->
            <div class="box-last">
                <div class="box box-6">
                <span class="box-label">F</span>
                <div class="dot"></div>
                </div>
            </div>
        </div>

    </body>

</html>
